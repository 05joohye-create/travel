<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 버킷리스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌍 나의 여행 버킷리스트</h1>
    <p>가보고 싶은 여행지를 기록해보세요!</p>
</header>

<main>

    <section class="input-box">
        <input
            type="text"
            id="placeInput"
            placeholder="여행지를 입력하세요"
        >

        <button onclick="addPlace()">
            추가
        </button>
    </section>

    <section>
        <ul id="placeList"></ul>
    </section>

</main>

<script src="app.js"></script>

</body>
</html>
